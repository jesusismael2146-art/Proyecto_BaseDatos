<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Final BD</title>
    
    <link rel="stylesheet" href="estilos.css">
</head>
<div class="container">
    <h1>🔭 Sistema del Observatorio</h1>
    
 <section>
        <h2 id="titulo-formulario">Registrar Nueva Observación</h2>
        <form id="formulario-bitacora">
            <input type="hidden" name="id_observacion" id="id_observacion">
            
            <label for="id_astronomo">Astrónomo a cargo:</label>
            <select name="id_astronomo" id="id_astronomo" required>
                <option value="1">Juan Pérez</option>
                <option value="2">Dra. Clara Vega</option>
                <option value="3">Jesus</option>
                <option value="4">Alan</option>
            </select>

            <label for="id_telescopio">Telescopio utilizado:</label>
            <select name="id_telescopio" id="id_telescopio" required>
                <option value="1">Celestron 8"</option>
                <option value="2">Refractor 70mm</option>
                <option value="3">SkyWatcher Heritage 130p</option>
                <option value="4">Celestron AstroMaster 130EQ</option>
                <option value="5">Omegon AC 70/700 AZ-2</option>
            </select>

            <label for="id_cuerpo">Cuerpo Celeste detectado:</label>
            <select name="id_cuerpo" id="id_cuerpo" required>
                <option value="1">Marte</option>
                <option value="2">Andrómeda</option>
                <option value="3">Nebulosa de Orión</option>
                <option value="4">Luna</option>
                <option value="5">Titan</option>
                <option value="6">Venus</option>
                <option value="7">Nebulosa Laguna</option>
                <option value="8">Europa</option>
                <option value="9">Jupiter</option>
                <option value="10">Saturno</option>
                <option value="11">Sirius</option>
                <option value="12">Pollux</option>
                <option value="13">Castor</option>
            </select>
            <label for="hallazgo">Notas del Hallazgo:</label>
            <textarea name="hallazgo" id="hallazgo" required></textarea>

            <button type="submit" id="btn-guardar">🚀 Guardar en Base de Datos</button>
            <button type="button" id="btn-cancelar" style="display:none;" onclick="cancelarEdicion()">❌ Cancelar Edición</button>
        </form>
    </section>
    <hr>

    <section>
        <h2>📜 Registro Histórico</h2>
       
        <div style="overflow-x: auto;">
            <table id="tabla-observaciones">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Astrónomo</th>
                        <th>Telescopio</th>
                        <th>Cuerpo Celeste</th>
                        <th>Categoría</th> <th>Hallazgo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </section>
</div>

<script src="/script.js"></script>

</body>
</html>
